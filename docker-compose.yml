version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: unt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-unt_horarios}
      POSTGRES_USER: ${DB_USER:-unt_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-unt_secret_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - unt_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-unt_admin} -d ${DB_NAME:-unt_horarios}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: unt_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-unt_redis_secret}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - unt_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
    container_name: unt_app
    restart: unless-stopped
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - unt_network
    command: ${DOCKER_COMMAND:-npm run dev}
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - WATCHPACK_POLLING=true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  unt_network:
    driver: bridge
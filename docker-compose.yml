version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: unt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-unt_horarios}
      POSTGRES_USER: ${DB_USER:-unt_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-unt_secret_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    # Sin puerto publicado en host (la app usa la red interna "postgres:5432")
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - unt_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-unt_admin} -d ${DB_NAME:-unt_horarios}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis para caché y WebSockets
  redis:
    image: redis:7-alpine
    container_name: unt_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-unt_redis_secret}
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - unt_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-unt_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicación Next.js (Frontend + Backend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: unt_app
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${DB_USER:-unt_admin}:${DB_PASSWORD:-unt_secret_2024}@postgres:5432/${DB_NAME:-unt_horarios}?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD:-unt_redis_secret}@redis:6379
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - unt_network
    command: sh -c "npx prisma generate && npx prisma db push && npm run dev"

  # Prisma Studio (opcional, para desarrollo)
  prisma-studio:
    image: node:20-alpine
    container_name: unt_prisma_studio
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-unt_admin}:${DB_PASSWORD:-unt_secret_2024}@postgres:5432/${DB_NAME:-unt_horarios}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5555:5555"
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - unt_network
    command: sh -c "npx prisma generate && npx prisma studio"
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  unt_network:
    driver: bridge
